<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Real Estate AI Assistant</title>

  <!-- JSPDF -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#eceff1;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .chat-container{
      width:420px;
      height:90vh;
      background:white;
      border-radius:15px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    .chat-header{
      background:#007bff;
      color:white;
      padding:18px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .chat-body{
      flex:1;
      padding:15px;
      overflow-y:auto;
      background:#f5f7fb;
    }

    .message{
      margin-bottom:15px;
      display:flex;
      flex-direction:column;
    }

    .user-message{
      align-items:flex-end;
    }

    .bot-message{
      align-items:flex-start;
    }

    .bubble{
      max-width:85%;
      padding:14px;
      border-radius:15px;
      line-height:1.7;
      font-size:15px;
    }

    .user-message .bubble{
      background:#007bff;
      color:white;
      border-bottom-right-radius:5px;
    }

    .bot-message .bubble{
      background:white;
      color:#333;
      border:1px solid #ddd;
      border-bottom-left-radius:5px;
    }

    .property-image{
      width:100%;
      border-radius:10px;
      margin-top:12px;
      height:220px;
      object-fit:cover;
    }

    .contact-box{
      margin-top:15px;
      background:#f0f4ff;
      padding:12px;
      border-radius:10px;
      border:1px solid #d6e0ff;
    }

    .contact-box h4{
      margin-bottom:8px;
      color:#111;
    }

    .contact-box p{
      margin-bottom:6px;
      color:#444;
      font-size:14px;
    }

    .chat-footer{
      padding:15px;
      border-top:1px solid #ddd;
      background:white;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:14px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:15px;
      cursor:pointer;
      margin-top:8px;
    }

    button:hover{
      background:#0056b3;
    }

    .download-btn{
      background:#28a745;
    }

    .download-btn:hover{
      background:#1f7d36;
    }

    .loading{
      text-align:center;
      margin-top:10px;
      color:#666;
      font-size:14px;
    }

  </style>

</head>

<body>

  <div class="chat-container">

    <!-- HEADER -->

    <div class="chat-header">

      🏠 Real Estate AI Assistant

    </div>

    <!-- CHAT BODY -->

    <div
      class="chat-body"
      id="chatBody"
    >

      <div class="message bot-message">

        <div class="bubble">

          Hello 👋<br><br>

          Upload property image and enter Property ID to generate AI advertisement.

        </div>

      </div>

    </div>

    <!-- FOOTER -->

    <div class="chat-footer">

      <input
        type="number"
        id="propertyId"
        placeholder="Enter Property ID"
      >

      <input
        type="file"
        id="imageFile"
        accept="image/*"
      >

      <button onclick="generateAdvertisement()">

        Generate Advertisement

      </button>

      <div
        class="loading"
        id="loading"
      ></div>

    </div>

  </div>

  <script>

    async function generateAdvertisement(){

      const propertyId =
        document.getElementById("propertyId").value;

      const file =
        document.getElementById("imageFile").files[0];

      const loading =
        document.getElementById("loading");

      const chatBody =
        document.getElementById("chatBody");

      if(!propertyId){

        alert("Enter Property ID");
        return;

      }

      if(!file){

        alert("Upload image");
        return;

      }

      try{

        loading.innerHTML =
          "Uploading image...";

        // USER MESSAGE

        const userDiv =
          document.createElement("div");

        userDiv.className =
          "message user-message";

        userDiv.innerHTML = `
          <div class="bubble">
            Generate advertisement for Property ID:
            ${propertyId}
          </div>
        `;

        chatBody.appendChild(userDiv);

        // CLOUDINARY IMAGE UPLOAD

        const formData =
          new FormData();

        formData.append(
          "file",
          file
        );

        formData.append(
          "upload_preset",
          "realestate"
        );

        const cloudinaryResponse =
          await fetch(
            "https://api.cloudinary.com/v1_1/dlafd1hxn/image/upload",
            {
              method:"POST",
              body:formData
            }
          );

        const cloudinaryData =
          await cloudinaryResponse.json();

        const imageUrl =
          cloudinaryData.secure_url;

        loading.innerHTML =
          "Generating advertisement...";

        // BACKEND CALL

        const response =
          await fetch(
            "http://127.0.0.1:5000/generate-ad",
            {
              method:"POST",

              headers:{
                "Content-Type":"application/json"
              },

              body:JSON.stringify({

                propertyId:propertyId,
                imagePath:imageUrl

              })

            }
          );

        const data =
          await response.json();

        loading.innerHTML = "";

        // ERROR

        if(data.error){

          const errorDiv =
            document.createElement("div");

          errorDiv.className =
            "message bot-message";

          errorDiv.innerHTML = `
            <div class="bubble">
              ${data.error}
            </div>
          `;

          chatBody.appendChild(errorDiv);

          return;

        }

        // FORMAT ADVERTISEMENT

        const formattedAd =
          data.advertisement
          .replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
          .replace(/\n/g,"<br><br>");

        // BOT RESPONSE

        const botDiv =
          document.createElement("div");

        botDiv.className =
          "message bot-message";

        botDiv.innerHTML = `

          <div class="bubble">

            <div id="adContent">

              ${formattedAd}

              <img
                src="${data.imageUrl}"
                class="property-image"
                id="propertyImage"
              >

              <div class="contact-box">

                <h4>Contact Information</h4>

                <p id="ownerName">
                  <b>Owner:</b>
                  ${data.ownerName}
                </p>

                <p id="ownerMobile">
                  <b>Mobile:</b>
                  ${data.mobile}
                </p>

              </div>

            </div>

            <button
              class="download-btn"
              onclick="downloadPDF()"
            >
              ⬇ Download PDF
            </button>

          </div>

        `;

        chatBody.appendChild(botDiv);

        // AUTO SCROLL

        chatBody.scrollTop =
          chatBody.scrollHeight;

      }

      catch(error){

        console.log(error);

        loading.innerHTML = "";

        alert("Server Error");

      }

    }

    // =====================================
    // DOWNLOAD PDF
    // =====================================

    async function downloadPDF(){

      try{

        const { jsPDF } =
          window.jspdf;

        const doc =
          new jsPDF();

        const adText =
          document.getElementById("adContent").innerText;

        const owner =
          document.getElementById("ownerName").innerText;

        const mobile =
          document.getElementById("ownerMobile").innerText;

        const imageUrl =
          document.getElementById("propertyImage").src;

        // TITLE

        doc.setFontSize(20);

        doc.text(
          "Real Estate Advertisement",
          20,
          20
        );

        // AD CONTENT

        doc.setFontSize(12);

        const splitText =
          doc.splitTextToSize(
            adText,
            170
          );

        doc.text(
          splitText,
          20,
          40
        );

        // FETCH IMAGE

        const imageData =
          await fetch(imageUrl)
          .then(res => res.blob())
          .then(blob => {

            return new Promise((resolve) => {

              const reader =
                new FileReader();

              reader.onloadend = () =>
                resolve(reader.result);

              reader.readAsDataURL(blob);

            });

          });

        // ADD IMAGE

        doc.addImage(
          imageData,
          "JPEG",
          20,
          120,
          160,
          90
        );

        // CONTACT INFO

        doc.setFontSize(14);

        doc.text(
          "Contact Information",
          20,
          225
        );

        doc.setFontSize(12);

        doc.text(
          owner,
          20,
          235
        );

        doc.text(
          mobile,
          20,
          245
        );

        // SAVE PDF

        doc.save(
          "property_advertisement.pdf"
        );

      }

      catch(error){

        console.log(error);

        alert(
          "PDF generation failed"
        );

      }

    }

  </script>

</body>

</html>
