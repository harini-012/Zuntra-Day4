<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Real Estate AI Chatbot</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#eceff1;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .chat-container{
      width:420px;
      height:90vh;
      background:white;
      border-radius:15px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    /* HEADER */

    .chat-header{
      background:#007bff;
      color:white;
      padding:18px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    /* CHAT AREA */

    .chat-body{
      flex:1;
      padding:15px;
      overflow-y:auto;
      background:#f5f7fb;
    }

    .message{
      margin-bottom:15px;
      display:flex;
      flex-direction:column;
    }

    .user-message{
      align-items:flex-end;
    }

    .bot-message{
      align-items:flex-start;
    }

    .bubble{
      max-width:85%;
      padding:14px;
      border-radius:15px;
      line-height:1.7;
      font-size:15px;
    }

    .user-message .bubble{
      background:#007bff;
      color:white;
      border-bottom-right-radius:5px;
    }

    .bot-message .bubble{
      background:white;
      color:#333;
      border:1px solid #ddd;
      border-bottom-left-radius:5px;
    }

    /* IMAGE */

    .property-image{
      width:100%;
      border-radius:10px;
      margin-top:12px;
      height:220px;
      object-fit:cover;
    }

    /* CONTACT */

    .contact-box{
      margin-top:15px;
      background:#f0f4ff;
      padding:12px;
      border-radius:10px;
      border:1px solid #d6e0ff;
    }

    .contact-box h4{
      margin-bottom:8px;
      color:#111;
    }

    .contact-box p{
      margin-bottom:6px;
      color:#444;
      font-size:14px;
    }

    /* INPUT AREA */

    .chat-footer{
      padding:15px;
      border-top:1px solid #ddd;
      background:white;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:14px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:15px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .loading{
      text-align:center;
      margin-top:10px;
      color:#666;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="chat-container">

    <!-- HEADER -->

    <div class="chat-header">

      Real Estate AI Assistant

    </div>

    <!-- CHAT BODY -->

    <div class="chat-body" id="chatBody">

      <div class="message bot-message">

        <div class="bubble">

          Hello 👋<br><br>

          Upload a property image and enter Property ID to generate an AI advertisement.

        </div>

      </div>

    </div>
    <button onclick="startVoice()">
  🎤 Speak
</button>

    <!-- FOOTER -->

    <div class="chat-footer">

      <input
        type="number"
        id="propertyId"
        placeholder="Enter Property ID"
      >

      <input
        type="file"
        id="imageFile"
        accept="image/*"
      >

      <button onclick="generateAdvertisement()">

        Generate Advertisement

      </button>

      <div class="loading" id="loading"></div>

    </div>

  </div>
<script>
 let recognition;

// ================================
// TEXT TO SPEECH (BOT VOICE)
// ================================
function speakText(text){

  const speech = new SpeechSynthesisUtterance(text);

  // Try multilingual auto voice selection
  const voices = window.speechSynthesis.getVoices();

  const preferred =
    voices.find(v =>
      v.lang.includes("en") ||
      v.lang.includes("ta") ||
      v.lang.includes("hi") ||
      v.lang.includes("kn") ||
      v.lang.includes("te")
    );

  if(preferred){
    speech.voice = preferred;
  }

  speech.rate = 1;
  speech.pitch = 1;
  speech.volume = 1;

  window.speechSynthesis.speak(speech);
}

// ================================
// SPEECH TO TEXT (MULTILINGUAL)
// ================================
function startVoice(){

  recognition =
    new (window.SpeechRecognition ||
    window.webkitSpeechRecognition)();

  recognition.lang = "en-IN"; // base Indian English

  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = function(){
    alert("🎤 Listening...");
  };

  recognition.onresult = function(event){

    let text = event.results[0][0].transcript;

    document.getElementById("propertyId").value = "";

    // Put voice text into message box logic
    alert("You said: " + text);

    // OPTIONAL: you can auto-send to chat API if needed
  };

  recognition.onerror = function(err){
    console.log(err);
    alert("Voice error");
  };

  recognition.start();
}

// ================================
// EXISTING FUNCTION (UPDATED)
// ================================
async function generateAdvertisement(){

  const propertyId =
    document.getElementById("propertyId").value;

  const file =
    document.getElementById("imageFile").files[0];

  const loading =
    document.getElementById("loading");

  const chatBody =
    document.getElementById("chatBody");

  if(!propertyId){
    alert("Enter Property ID");
    return;
  }

  if(!file){
    alert("Upload image");
    return;
  }

  try{

    loading.innerHTML = "Uploading image...";

    const userDiv = document.createElement("div");
    userDiv.className = "message user-message";
    userDiv.innerHTML = `
      <div class="bubble">
        Generate advertisement for Property ID: ${propertyId}
      </div>
    `;
    chatBody.appendChild(userDiv);

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "realestate");

    const cloudinaryResponse =
      await fetch(
        "https://api.cloudinary.com/v1_1/dlafd1hxn/image/upload",
        { method:"POST", body:formData }
      );

    const cloudinaryData =
      await cloudinaryResponse.json();

    const imageUrl = cloudinaryData.secure_url;

    loading.innerHTML = "Generating AI advertisement...";

    const response = await fetch(
      "http://127.0.0.1:5000/generate-ad",
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          propertyId:propertyId,
          imagePath:imageUrl
        })
      }
    );

    const data = await response.json();

    loading.innerHTML = "";

    if(data.error){

      const errorDiv = document.createElement("div");
      errorDiv.className = "message bot-message";
      errorDiv.innerHTML = `<div class="bubble">${data.error}</div>`;
      chatBody.appendChild(errorDiv);

      return;
    }

    const formattedAd =
      data.advertisement
      .replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
      .replace(/\n/g,"<br><br>");

    const botDiv = document.createElement("div");
    botDiv.className = "message bot-message";

    const finalText =
      data.advertisement.replace(/\*\*(.*?)\*\*/g,"$1");

    botDiv.innerHTML = `
      <div class="bubble">

        ${formattedAd}

        <img src="${data.imageUrl}" class="property-image"/>

        <div class="contact-box">
          <h4>Contact Information</h4>
          <p><b>Owner:</b> ${data.ownerName}</p>
          <p><b>Mobile:</b> ${data.mobile}</p>
        </div>

      </div>
    `;

    chatBody.appendChild(botDiv);

    // 🔊 AUTO VOICE RESPONSE
    speakText(finalText);

    chatBody.scrollTop = chatBody.scrollHeight;

  }

  catch(error){
    loading.innerHTML = "";
    console.log(error);
    alert("Server Error");
  }
}
</script>


</body>
</html>
